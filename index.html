<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Bulls — Financial Social Network</title>
    <meta name="description" content="Bulls is the social network for investors, traders and financial professionals. Connect, learn and invest better." />
    <meta name="robots" content="index, follow" />

    <!-- PWA / Mobile -->
    <meta name="theme-color" content="#16a34a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Bulls" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Open Graph -->
    <meta property="og:title" content="Bulls — Financial Social Network" />
    <meta property="og:description" content="The social network for investors, traders and financial professionals." />
    <meta property="og:type" content="website" />

    <style>
      html, body { height: 100%; margin: 0; background: #f8fafc; }
      #root { height: 100%; }
      /* Loading spinner before React mounts */
      #splash {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: #fff; z-index: 9999;
      }
      #splash .bull {
        width: 56px; height: 56px;
        background: #16a34a; border-radius: 16px;
        display: flex; align-items: center; justify-content: center;
        margin-bottom: 16px;
        font-size: 28px;
      }
      #splash .spinner {
        width: 32px; height: 32px;
        border: 3px solid #e2e8f0;
        border-top-color: #16a34a;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="bull">🐂</div>
      <div class="spinner"></div>
    </div>
    <div id="root"></div>
    <script>
      // Remove splash when React is ready
      window.addEventListener('DOMContentLoaded', () => {
        const observer = new MutationObserver(() => {
          const root = document.getElementById('root');
          if (root && root.children.length > 0) {
            const splash = document.getElementById('splash');
            if (splash) splash.style.display = 'none';
            observer.disconnect();
          }
        });
        observer.observe(document.getElementById('root'), { childList: true });
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
